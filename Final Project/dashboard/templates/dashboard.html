<!DOCTYPE html>
<html>
<head><title>Smart Room Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head>
<body>
<h1>Live Temp/Humidity Dashboard</h1>
<div><canvas id="chart" width="400" height="200"></canvas></div>
<table border="1">
<tr><th>ID</th><th>Temp (°C)</th><th>Hum (%)</th><th>Time</th></tr>
{% for row in readings %}
<tr><td>{{ row[0] }}</td><td>{{ row[1] }}</td><td>{{ row[2] }}</td><td>{{ row[3] }}</td></tr>
{% endfor %}
</table>

<script>
const ctx = document.getElementById('chart').getContext('2d');
const chart = new Chart(ctx, {
  type: 'line', data: { labels: [], datasets: [{label: 'Temp', data: []}, {label: 'Hum', data: []}] },
  options: { scales: { y: { beginAtZero: true } } }
});

setInterval(async () => {
  const data = await fetch('/api/latest').then(r => r.json());
  chart.data.labels.push(new Date().toLocaleTimeString());
  chart.data.datasets[0].data.push(data.temp);
  chart.data.datasets[1].data.push(data.hum);
  if (chart.data.labels.length > 20) {
    chart.data.labels.shift(); chart.data.datasets[0].data.shift(); chart.data.datasets[1].data.shift();
  }
  chart.update();
}, 3000);
</script>
</body>
</html>
